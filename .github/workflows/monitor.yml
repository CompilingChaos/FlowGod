name: FlowGod Monitor

on:
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FlowGod
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python flow_god.py

      - name: Commit processed messages
        run: |
          git config --global user.name "FlowGod Bot"
          git config --global user.email "flowgod@bot.com"
          git add processed_messages.json
          git commit -m "Update processed messages [skip ci]" || echo "No changes to commit"
          git push
