name: FlowGod Monitor

on:
  schedule:
    # Run every 25 minutes, Monday-Friday, from 13:00 to 22:00 UTC (Market Hours)
    - cron: '*/25 13-22 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Scrape Discord
        env:
          # We will pass the session as a secret or committed file
          # For now, we assume it's in the repo (careful with privacy!)
          DISCORD_SESSION: ${{ secrets.DISCORD_SESSION_JSON }}
        run: |
          if [ -n "$DISCORD_SESSION" ]; then
            echo "$DISCORD_SESSION" > discord_session.json
          fi
          python discord_scraper.py

      - name: Run FlowGod
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python flow_god.py

      - name: Market Validation
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python market_validator.py

      - name: Commit State & Database
        run: |
          git config --global user.name "FlowGod Bot"
          git config --global user.email "flowgod@bot.com"
          git add processed_messages.json flow_god.db
          git commit -m "Update state and performance database [skip ci]" || echo "No changes to commit"
          git push
