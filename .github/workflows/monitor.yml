name: FlowGod Monitor

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright Browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright
        run: playwright install chromium

      - name: Scrape Discord
        env:
          DISCORD_SESSION: ${{ secrets.DISCORD_SESSION_JSON }}
        run: |
          if [ -n "$DISCORD_SESSION" ]; then
            echo "$DISCORD_SESSION" > discord_session.json
          fi
          python discord_scraper.py

      - name: Monitor X (via Gmail)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python x_monitor.py

      - name: Run FlowGod
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # The 20:00 UTC (3 PM EST) run triggers the consolidated Alpha Report
          HOUR=$(date +%H)
          if [ "$HOUR" = "20" ]; then
            echo "📢 Triggering Combined Pre-Close Alpha Report"
            python flow_god.py --report
          else
            python flow_god.py
          fi

      - name: Market Validation
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python market_validator.py

      - name: Commit State & Database
        run: |
          git config --global user.name "FlowGod Bot"
          git config --global user.email "flowgod@bot.com"
          git add processed_messages.json flow_god.db
          git commit -m "Update state and performance database [skip ci]" || echo "No changes to commit"
          git push
