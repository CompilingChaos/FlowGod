name: FlowGod Monitor

on:
  schedule:
    # Run every 15 minutes, Monday-Friday, from 14:00 to 21:00 UTC (9:00 AM - 4:00 PM EST)
    - cron: '*/15 14-21 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright Browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright
        run: playwright install chromium

      - name: Scrape Discord
        env:
          DISCORD_SESSION: ${{ secrets.DISCORD_SESSION_JSON }}
        run: |
          if [ -n "$DISCORD_SESSION" ]; then
            echo "$DISCORD_SESSION" > discord_session.json
          fi
          python discord_scraper.py

      - name: Run FlowGod
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python flow_god.py

      - name: Market Validation
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python market_validator.py

      - name: Commit State & Database
        run: |
          git config --global user.name "FlowGod Bot"
          git config --global user.email "flowgod@bot.com"
          git add processed_messages.json flow_god.db
          git commit -m "Update state and performance database [skip ci]" || echo "No changes to commit"
          git push
